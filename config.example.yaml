# Obsidian Web configuration.
# Copy to config.yaml and adjust. Environment overrides:
#   OBSIDIANWEB_VAULT, OBSIDIANWEB_ADDR, OBSIDIANWEB_JWT_SECRET

server:
  addr: ":8787"
  # Allow cross-origin requests (only for frontend development).
  devCors: false

vault:
  # Path to your existing Obsidian vault. It is used in place — nothing
  # is copied or imported.
  path: "./examples/vault"
  # Folder inside the vault holding note templates.
  templatesDir: "Templates"
  # Default folder for uploaded attachments.
  attachmentsDir: "attachments"

notes:
  # Where new notes go when no folder is chosen.
  defaultFolder: "Inbox"
  # Per-type folders used by the note creation API (type -> folder).
  typeFolders:
    daily: "Daily"
    meeting: "Meetings"
    book: "Books"
    idea: "Ideas"
    project: "Projects"
  # Generate YAML frontmatter automatically for new notes.
  autoFrontmatter: true
  # Maintain created_by / updated_by frontmatter fields on notes saved
  # through the platform (recommended for team vaults).
  trackAuthorship: false

history:
  # Git-backed change history: per-note revisions, diffs, restore and a
  # trash for deleted notes. In managed mode a .git repository is
  # created inside the vault and every change becomes a commit.
  enabled: true
  # managed — the platform commits every change;
  # external — the vault is already a git repo managed elsewhere
  #            (history is read-only); off — same as enabled: false.
  mode: managed
  # Coalesce direct file-system edits (Obsidian, editors) into one
  # revision per file per interval, seconds.
  externalDebounceSec: 45

auth:
  # Disabled by default: ideal for a private, local instance.
  enabled: false
  # Required when enabled (or set OBSIDIANWEB_JWT_SECRET).
  jwtSecret: ""
  tokenTtlHours: 24
  admin:
    username: "admin"
    # Either a plaintext password (development only)…
    password: ""
    # …or a bcrypt hash (production): ./bin/obsidianweb-cli hash-password
    passwordHash: ""
  # Additional accounts. Roles: viewer (read-only) | editor (read/write)
  # | admin (also settings). Role defaults to viewer when omitted.
  # Generate hashes with: ./bin/obsidianweb-cli hash-password
  users: []
  #  - username: "editor"
  #    passwordHash: "$2a$10$…"
  #    role: "editor"
  #  - username: "guest"
  #    passwordHash: "$2a$10$…"
  #    role: "viewer"
  # Hot-reloadable store for team accounts, groups and folder ACL rules,
  # managed through the admin UI (/admin) without restarts. Must point
  # to a writable location (in Docker: /data/users.yaml).
  usersFile: "users.yaml"

web:
  # Serve the frontend from a directory instead of the embedded build
  # (useful during development). Empty = use the embedded frontend.
  staticDir: ""

log:
  level: "info" # debug | info | warn | error
