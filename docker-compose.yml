services:
  obsidianweb:
    build: .
    ports:
      - "8787:8787"
    volumes:
      # Mount your existing Obsidian vault (read-write).
      - ./examples/vault:/vault
      # External configuration file.
      - ./config:/config:ro
      # Writable data: users.yaml (accounts, groups, ACL). Set
      # auth.usersFile: /data/users.yaml in config.yaml.
      - ./data:/data
    environment:
      - OBSIDIANWEB_VAULT=/vault
      # - OBSIDIANWEB_JWT_SECRET=change-me
    restart: unless-stopped
